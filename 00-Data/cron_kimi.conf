# OpenClaw Cron 配置 - Kimi 工作流自动化

# 工作流调度配置
# 格式：name, schedule, command

## 通知处理
# 每 5 分钟检查并发送待处理通知
notification_processor,*/5 * * * *,python3 /home/kyj/.openclaw/workspace/notification_processor.py

## 记忆备份
# 每天凌晨 2 点备份记忆数据
memory_backup,0 2 * * *,python3 /home/kyj/.openclaw/workspace/auto_archive_memory.py

## Kimi 任务清理
# 每周日清理旧的任务日志
kimi_cleanup,0 3 * * 0,find /home/kyj/.openclaw/workspace -name "kimi_tasks.log" -mtime +30 -delete
